kind = "web"
previewPath = "/"
title = "HiddenFreeways"
version = "1.0.0"
id = "artifacts/hidden-freeways"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19571

[services.development]
run = "pnpm --filter @workspace/hidden-freeways run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hidden-freeways", "run", "build" ]
publicDir = "artifacts/hidden-freeways/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19571"
BASE_PATH = "/"
